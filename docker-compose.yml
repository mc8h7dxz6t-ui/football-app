services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # DragonflyDB drop-in (redis:// compatible). Use: COMPOSE_PROFILES=dragonfly docker compose up -d dragonfly
  # Then set REDIS_URL=redis://dragonfly:6379/0 and FVE_REDIS_BACKEND=dragonfly
  dragonfly:
    image: docker.dragonflydb.io/dragonflydb/dragonfly:v1.25.4
    restart: unless-stopped
    profiles: ["dragonfly"]
    ulimits:
      memlock: -1
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-p", "6379", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    profiles: ["full"]
    environment:
      POSTGRES_USER: fve
      POSTGRES_PASSWORD: fve
      POSTGRES_DB: fve
    ports:
      - "5432:5432"
    volumes:
      - fve_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fve"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    restart: unless-stopped
    ports:
      - "${FVE_API_PORT:-8000}:8000"
    env_file:
      - .env
    environment:
      REDIS_URL: redis://redis:6379/0
      FVE_TCP_NODELAY: "1"
    command:
      [
        "python",
        "-m",
        "uvicorn",
        "api.main:app",
        "--host",
        "0.0.0.0",
        "--port",
        "8000",
        "--loop",
        "uvloop",
        "--http",
        "httptools",
      ]
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=5)",
        ]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 20s

  worker:
    build:
      context: .
      dockerfile: Dockerfile.api
    restart: unless-stopped
    profiles: ["ingest"]
    command: ["python", "worker.py", "--auto"]
    env_file:
      - .env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      REDIS_URL: redis://redis:6379/0
      FVE_AUTO_WATCHLIST: "1"
      FVE_WORKER_HEARTBEAT: /tmp/fve_worker_heartbeat
      FVE_TCP_NODELAY: "1"
    depends_on:
      redis:
        condition: service_healthy
      api:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "test -f /tmp/fve_worker_heartbeat && test $(($(date +%s) - $(cat /tmp/fve_worker_heartbeat))) -lt 180",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 120s

  ui:
    build:
      context: .
      dockerfile: Dockerfile.api
    restart: unless-stopped
    profiles: ["ui"]
    command:
      [
        "streamlit",
        "run",
        "app.py",
        "--server.headless",
        "true",
        "--server.port",
        "8501",
        "--server.address",
        "0.0.0.0",
      ]
    ports:
      - "8501:8501"
    env_file:
      - .env
    environment:
      FVE_API_URL: http://api:8000
    depends_on:
      api:
        condition: service_healthy

  worker-arb:
    build:
      context: .
      dockerfile: Dockerfile.api
    restart: unless-stopped
    profiles: ["arb-shadow"]
    command: ["python", "worker.py", "--auto"]
    env_file:
      - .env
    environment:
      REDIS_URL: redis://redis:6379/0
      FVE_PAUSED: "1"
      FVE_ARB_ONLY: "1"
      FVE_AUTO_WATCHLIST: "1"
      DISABLED_FEEDS: api-football,betfair,pinnacle,the-odds-api
      ENABLE_ODDS_API_FEED: "0"
      MATCHBOOK_KILL_SWITCH: "1"
      FVE_WORKER_HEARTBEAT: /tmp/fve_worker_heartbeat
    depends_on:
      redis:
        condition: service_healthy
      api:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "test -f /tmp/fve_worker_heartbeat && test $(($(date +%s) - $(cat /tmp/fve_worker_heartbeat))) -lt 180",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 120s

  arb-scanner:
    build:
      context: .
      dockerfile: Dockerfile.api
    restart: unless-stopped
    profiles: ["arb-shadow"]
    command: ["python", "arb_worker.py"]
    env_file:
      - .env
    environment:
      REDIS_URL: redis://redis:6379/0
      FVE_PAUSED: "1"
      FVE_ARB_ONLY: "1"
      DISABLED_FEEDS: api-football,betfair,pinnacle,the-odds-api
      ENABLE_ODDS_API_FEED: "0"
      MATCHBOOK_KILL_SWITCH: "1"
      MATCHBOOK_AUTO_TRADE: "0"
      ARB_SHADOW_LOG: "1"
    depends_on:
      redis:
        condition: service_healthy
      worker-arb:
        condition: service_healthy

volumes:
  fve_pg:
