services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: fve
      POSTGRES_PASSWORD: fve
      POSTGRES_DB: fve
    ports:
      - "5432:5432"
    volumes:
      - fve_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fve"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    ports:
      - "8000:8000"
    environment:
      REDIS_URL: redis://redis:6379/0
      DATABASE_URL: postgresql+psycopg://fve:fve@postgres:5432/fve
      API_SPORTS_KEY: ${API_SPORTS_KEY:-}
      MATCHBOOK_USERNAME: ${MATCHBOOK_USERNAME:-}
      MATCHBOOK_PASSWORD: ${MATCHBOOK_PASSWORD:-}
      ODDS_API_KEY: ${ODDS_API_KEY:-}
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy

  worker:
    build:
      context: .
      dockerfile: Dockerfile.api
    command: python worker.py --fixtures "${WATCHLIST_FIXTURES:-}"
    environment:
      REDIS_URL: redis://redis:6379/0
      DATABASE_URL: postgresql+psycopg://fve:fve@postgres:5432/fve
      API_SPORTS_KEY: ${API_SPORTS_KEY:-}
      MATCHBOOK_USERNAME: ${MATCHBOOK_USERNAME:-}
      MATCHBOOK_PASSWORD: ${MATCHBOOK_PASSWORD:-}
      WATCHLIST_FIXTURES: ${WATCHLIST_FIXTURES:-}
      INGEST_INTERVAL_SEC: "5"
    depends_on:
      redis:
        condition: service_healthy

volumes:
  fve_pg:
